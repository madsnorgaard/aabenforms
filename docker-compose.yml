networks:
  web:
    external: true
  internal:
    external: false
  mail:
    external: true
    name: mail_internal

services:
  aabenforms_db:
    image: mariadb:11
    container_name: aabenforms_db
    env_file:
    - .env
    restart: always
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASS}"
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - ./data/mysql:/var/lib/mysql
    labels:
      - "traefik.enable=false"
    networks:
      - internal

  drupal:
    container_name: aabenforms_drupal
    env_file:
    - .env
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    working_dir: /opt/drupal
    volumes:
      - ./web/modules/custom:/opt/drupal/web/modules/custom
      - ./web/profiles/custom:/opt/drupal/web/profiles/custom
      - ./web/themes/custom:/opt/drupal/web/themes/custom
      - drupal_files:/opt/drupal/web/sites/default/files
      - ./data/private:/opt/drupal/private
      - ./backups:/opt/drupal/backups
      - ./settings.php:/opt/drupal/web/sites/default/settings.php
      - ./services.prod.yml:/opt/drupal/web/sites/default/services.yml
      - ./config:/opt/drupal/config
    environment:
      COMPOSER_MEMORY_LIMIT: "2G"
      TRUSTED_HOST_PATTERNS: ${TRUSTED_HOST_PATTERNS}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: 3306
      HASH_SALT: ${HASH_SALT}
      REDIS_HOST: ${REDIS_HOST}
      SMTP_HOST: ${SMTP_HOST:-mail.madsnorgaard.net}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_PROTOCOL: ${SMTP_PROTOCOL:-tls}
      SMTP_USER: ${SMTP_USER:-mads@madsnorgaard.net}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-mads@madsnorgaard.net}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aabenforms_drupal.rule=Host(`api.aabenforms.dk`)"
      - "traefik.http.routers.aabenforms_drupal.tls.certresolver=lets-encrypt"
      - "traefik.http.services.aabenforms_drupal.loadbalancer.server.port=80"
    networks:
      - internal
      - web
      - mail
    depends_on:
      - aabenforms_db
      - aabenforms_redis

  aabenforms_redis:
    image: library/redis:latest
    container_name: aabenforms_redis
    volumes:
      - ./data/redis:/data
    command: ["redis-server"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 20s
      retries: 10
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"

  # Keycloak hosts the public mock IdP at https://auth.aabenforms.dk for the
  # interactive Byggetilladelse demo. Browsers hit the public hostname over
  # TLS via Traefik; Drupal performs the server-side token exchange against
  # the internal http://keycloak:8080 address on the shared internal network
  # so the round-trip stays inside the docker bridge. The H2 store is volume-
  # mounted so the imported realm survives container restarts; on first
  # boot --import-realm seeds the realm from the JSON below. To force a re-
  # import after editing the realm: docker compose down keycloak &&
  # docker volume rm api.aabenforms.dk_keycloak_data && docker compose up -d
  # keycloak.
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: aabenforms_keycloak
    restart: always
    env_file:
      - .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: auth.aabenforms.dk
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HTTP_PORT: 8080
    volumes:
      - ./docker/keycloak/realms/danish-gov-test.json:/opt/keycloak/data/import/danish-gov-test.json:ro
      - ./docker/keycloak/themes:/opt/keycloak/themes:ro
      - keycloak_data:/opt/keycloak/data
    command:
      - start-dev
      - --import-realm
      - --http-relative-path=/
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aabenforms_keycloak.rule=Host(`auth.aabenforms.dk`)"
      - "traefik.http.routers.aabenforms_keycloak.entrypoints=websecure"
      - "traefik.http.routers.aabenforms_keycloak.tls.certresolver=lets-encrypt"
      - "traefik.http.services.aabenforms_keycloak.loadbalancer.server.port=8080"
    networks:
      - internal
      - web

volumes:
  drupal_files:
  keycloak_data:
