parent-approval:
  version: 1.0
  css:
    theme:
      css/parent-approval.css: {}
  js:
    js/parent-approval.js: {}
  dependencies:
    - core/drupal
    - core/jquery

workflow_wizard:
  version: 1.0
  css:
    theme:
      css/workflow-wizard.css: {}
  dependencies:
    - core/drupal
    - core/jquery
    - aabenforms_core/admin

bpmn_editor:
  version: 1.0
  css:
    theme:
      css/bpmn-editor.css: {}
  js:
    js/bpmn-extensions/danish-municipal-palette.js: {}
    js/bpmn-editor.js: {}
  dependencies:
    - core/drupal
    - core/jquery
    # bpmn_io/core gives us just the BpmnJS global (bare bpmn-js library).
    # bpmn_io/ui is the modeler_api-integrated wrapper which assumes a
    # window.modeler global, settings.modeler_api.mode, and a #bpmn-io
    # div - none of which exist on our standalone wizard / preview pages.
    - bpmn_io/core

bpmn_preview:
  version: 1.0
  css:
    theme:
      css/template-browser.css: {}
  js:
    js/bpmn-preview.js: {}
  dependencies:
    - core/drupal
    - core/jquery
    # bpmn_io/core gives us just the BpmnJS global (bare bpmn-js library).
    # bpmn_io/ui is the modeler_api-integrated wrapper which assumes a
    # window.modeler global, settings.modeler_api.mode, and a #bpmn-io
    # div - none of which exist on our standalone wizard / preview pages.
    - bpmn_io/core
    - aabenforms_core/admin
