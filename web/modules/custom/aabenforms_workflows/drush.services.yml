services:
  aabenforms_workflows.drush_approval_token:
    class: Drupal\aabenforms_workflows\Drush\ApprovalTokenCommands
    arguments:
      - '@aabenforms_workflows.approval_token'
    tags:
      - { name: drush.command }
  aabenforms_workflows.drush_modeler:
    class: Drupal\aabenforms_workflows\Drush\ModelerCommands
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: drush.command }
