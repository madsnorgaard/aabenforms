services:
  logger.channel.aabenforms_digital_post:
    parent: logger.channel_base
    arguments: ['aabenforms_digital_post']

  aabenforms_digital_post.transaction_id_generator:
    class: Drupal\aabenforms_digital_post\Service\TransactionIdGenerator

  # Certificate locator: file-based default. Factory picks based on config.
  aabenforms_digital_post.certificate_locator.file:
    class: Drupal\aabenforms_digital_post\Certificate\FileCertificateLocator
    arguments: ['@config.factory']

  aabenforms_digital_post.certificate_locator:
    class: Drupal\aabenforms_digital_post\Certificate\CertificateLocatorInterface
    factory: ['@aabenforms_digital_post.certificate_locator_factory', 'create']

  aabenforms_digital_post.certificate_locator_factory:
    class: Drupal\aabenforms_digital_post\Certificate\CertificateLocatorFactory
    arguments:
      - '@config.factory'
      - '@aabenforms_digital_post.certificate_locator.file'

  # Sf1601 transport: fake_db or wiremock for now. Factory picks based on test_mode.
  aabenforms_digital_post.sf1601_client.fake_db:
    class: Drupal\aabenforms_digital_post\TestMode\FakeSendDatabaseLogger
    arguments:
      - '@database'
      - '@aabenforms_digital_post.transaction_id_generator'
      - '@datetime.time'
      - '@logger.channel.aabenforms_digital_post'

  aabenforms_digital_post.sf1601_client.wiremock:
    class: Drupal\aabenforms_digital_post\TestMode\WireMockSoapClient
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@logger.channel.aabenforms_digital_post'

  aabenforms_digital_post.sf1601_client:
    class: Drupal\aabenforms_digital_post\Service\Sf1601ClientInterface
    factory: ['@aabenforms_digital_post.sf1601_client_factory', 'create']

  aabenforms_digital_post.sf1601_client_factory:
    class: Drupal\aabenforms_digital_post\Service\Sf1601ClientFactory
    arguments:
      - '@config.factory'
      - '@aabenforms_digital_post.sf1601_client.fake_db'
      - '@aabenforms_digital_post.sf1601_client.wiremock'

  # Audit emitter: defaults to CoreAuditEmitter (wraps aabenforms_core.audit_logger).
  aabenforms_digital_post.audit_emitter:
    class: Drupal\aabenforms_digital_post\Audit\CoreAuditEmitter
    arguments: ['@aabenforms_core.audit_logger']

  # The public entry point.
  aabenforms_digital_post.sender:
    class: Drupal\aabenforms_digital_post\Service\DigitalPostSender
    arguments:
      - '@aabenforms_digital_post.sf1601_client'
      - '@aabenforms_digital_post.transaction_id_generator'
      - '@aabenforms_digital_post.audit_emitter'
      - '@config.factory'
      - '@logger.channel.aabenforms_digital_post'
