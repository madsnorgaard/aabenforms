aabenforms_core.dashboard:
  path: '/admin/aabenforms'
  defaults:
    _controller: '\Drupal\aabenforms_core\Controller\DashboardController::overview'
    _title: 'AabenForms'
  requirements:
    _permission: 'access aabenforms admin'

aabenforms_core.landing:
  path: '/aabenforms'
  defaults:
    _controller: '\Drupal\aabenforms_core\Controller\LandingController::page'
    _title: 'AabenForms'
  requirements:
    _access: 'TRUE'

aabenforms_core.webform_api:
  path: '/api/webform/{id}'
  defaults:
    _controller: '\Drupal\aabenforms_core\Controller\WebformApiController::getWebform'
    _title: 'Get Webform'
  requirements:
    _permission: 'access webform api'
  options:
    parameters:
      id:
        type: string

aabenforms_core.webform_submit:
  path: '/api/webform/{id}/submit'
  defaults:
    _controller: '\Drupal\aabenforms_core\Controller\WebformApiController::submitWebform'
    _title: 'Submit Webform'
  requirements:
    _permission: 'access webform api'
  methods: [POST]
  options:
    parameters:
      id:
        type: string
