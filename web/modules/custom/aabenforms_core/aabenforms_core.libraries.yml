# Shared admin styles for the AabenForms platform.
#
# Feature modules whose CSS targets admin UI should depend on
# `aabenforms_core/admin` so they automatically inherit the design tokens
# (colors, spacing, radii, motion) defined in css/admin-tokens.css.
#
# Each feature module keeps its own component CSS local to that module;
# only the tokens are centralized.
admin:
  version: 1.0.0
  css:
    base:
      css/admin-tokens.css: { weight: -100 }

# Dashboard layout: header, card grid, pills, activity feed, brand landing.
# Depends on the admin token library for --af-* CSS custom properties.
dashboard:
  version: 1.0.0
  css:
    theme:
      css/dashboard.css: {}
  dependencies:
    - aabenforms_core/admin
