uuid: f6a7b8c9-d0e1-2345-f012-567890123455
langcode: en
status: true
dependencies:
  module:
    - aabenforms_workflows
    - eca_content
    - modeler_api
third_party_settings:
  modeler_api:
    modeler_id: workflow_modeler
    label: association_booking_flow
id: association_booking_flow
weight: null
template: null
events:
  on_submission:
    plugin: 'content_entity:insert'
    configuration:
      type: 'webform_submission association_booking'
    successors:
      -
        id: mitid_validate
        condition: ''
conditions:
  gate_association_mitid_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[association_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_association_mitid_deny:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[association_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
gateways: {  }
actions:
  mitid_validate:
    label: 'Validate MitID Erhverv session'
    plugin: aabenforms_mitid_validate
    configuration:
      workflow_id_token: workflow_id_association
      result_token: association_mitid_valid
      session_data_token: association_session
    successors:
      -
        id: cvr_lookup
        condition: gate_association_mitid_ok
      -
        id: deny_association
        condition: gate_association_mitid_deny
  cvr_lookup:
    label: 'CVR registry lookup'
    plugin: aabenforms_cvr_lookup
    configuration:
      cvr_token: '[webform_submission:values:cvr:raw]'
      result_token: association_data
      use_cache: true
    successors:
      -
        id: log_received
        condition: ''
  log_received:
    label: 'Log: association request received'
    plugin: aabenforms_audit_log
    configuration:
      event_type: association_booking_submitted
      additional_data_token: '[webform_submission:values:association_name:raw]'
      message_template: 'Association request received and CVR resolved'
      status_token: association_data_status
    successors:
      -
        id: log_reviewer_assigned
        condition: ''
  log_reviewer_assigned:
    label: 'Log: reviewer assigned (stub for email)'
    plugin: aabenforms_audit_log
    configuration:
      event_type: association_booking_reviewer_assigned
      additional_data_token: '[webform_submission:values:reviewer_email:raw]'
      message_template: 'Stub. Production would email the assigned reviewer.'
    successors:
      -
        id: process_payment
        condition: ''
  process_payment:
    label: 'Process booking fee payment'
    plugin: aabenforms_process_payment
    configuration:
      amount_field: amount
      currency: DKK
      payment_method: nets_easy
      description_field: booking_purpose
      store_payment_id_in: payment_id
      store_status_in: payment_status
    successors:
      -
        id: log_complete
        condition: ''
  log_complete:
    label: 'Log: request processed'
    plugin: aabenforms_audit_log
    configuration:
      event_type: association_booking_complete
      additional_data_token: '[webform_submission:values:association_name:raw]'
      message_template: 'Association request decisioned (stub)'
    successors: {  }
  deny_association:
    label: 'Deny: MitID Erhverv not verified'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: association_booking_denied
      step_label: 'Identitet ikke bekraeftet'
      message: 'Bookingen blev ikke behandlet, fordi foreningens MitID Erhverv-identitet ikke kunne bekraeftes. Log ind og proev igen.'
    successors: {  }
