uuid: a7b8c9d0-e1f2-3456-0123-678901234566
langcode: en
status: true
dependencies:
  module:
    - aabenforms_workflows
    - eca_content
    - modeler_api
third_party_settings:
  modeler_api:
    modeler_id: workflow_modeler
    label: med_election_nomination_flow
id: med_election_nomination_flow
weight: null
template: null
events:
  on_submission:
    plugin: 'content_entity:insert'
    configuration:
      type: 'webform_submission med_election_nomination'
    successors:
      -
        id: mitid_validate
        condition: ''
conditions:
  gate_nominator_mitid_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[nominator_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_nominator_mitid_deny:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[nominator_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
gateways: {  }
actions:
  mitid_validate:
    label: 'Validate nominator MitID'
    plugin: aabenforms_mitid_validate
    configuration:
      workflow_id_token: workflow_id_med_nomination
      result_token: nominator_mitid_valid
      session_data_token: nominator_session
    successors:
      -
        id: cpr_lookup
        condition: gate_nominator_mitid_ok
      -
        id: deny_nomination
        condition: gate_nominator_mitid_deny
  cpr_lookup:
    label: 'Resolve nominator via CPR'
    plugin: aabenforms_cpr_lookup
    configuration:
      cpr_token: '[nominator_session:cpr]'
      result_token: nominator_data
      use_cache: true
    successors:
      -
        id: log_nomination
        condition: ''
  log_nomination:
    label: 'Record nomination in audit log'
    plugin: aabenforms_audit_log
    configuration:
      event_type: med_nomination_recorded
      additional_data_token: '[webform_submission:values:nominee_name:raw]'
      message_template: 'MED election nomination recorded'
    successors: {  }
  deny_nomination:
    label: 'Deny: nominator MitID not verified'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: med_nomination_denied
      step_label: 'Identitet ikke bekraeftet'
      message: 'Indstillingen blev ikke registreret, fordi din identitet ikke kunne bekraeftes med MitID. Log ind og proev igen.'
    successors: {  }
