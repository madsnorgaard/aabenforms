uuid: e5f6a7b8-c9d0-4567-89ab-companyver0001
langcode: en
status: true
dependencies:
  config:
    - webform.webform.company_verification
  module:
    - aabenforms_digital_post_eca
    - aabenforms_workflows
    - eca_content
    - modeler_api
third_party_settings:
  modeler_api:
    modeler_id: workflow_modeler
    label: company_verification_flow
id: company_verification_flow
weight: 0
template: null
events:
  on_submission:
    plugin: 'content_entity:insert'
    configuration:
      type: 'webform_submission company_verification'
    successors:
      -
        id: mitid_validate
        condition: ''
conditions:
  gate_company_mitid_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[company_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_company_mitid_deny:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[company_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
gateways: {  }
actions:
  mitid_validate:
    label: 'Validate MitID Erhverv session'
    plugin: aabenforms_mitid_validate
    configuration:
      workflow_id_token: workflow_id_company
      result_token: company_mitid_valid
      session_data_token: company_session
    successors:
      -
        id: cvr_lookup
        condition: gate_company_mitid_ok
      -
        id: deny_company
        condition: gate_company_mitid_deny
  cvr_lookup:
    label: 'CVR registry lookup'
    plugin: aabenforms_cvr_lookup
    configuration:
      cvr_token: '[webform_submission:values:cvr:raw]'
      result_token: company_data
      use_cache: true
    successors:
      -
        id: log_received
        condition: ''
  log_received:
    label: 'Log: company_verification_submitted'
    plugin: aabenforms_audit_log
    configuration:
      event_type: company_verification_submitted
      additional_data_token: ''
      message_template: 'Company verification request received; CVR resolved.'
      status_token: company_data_status
    successors:
      -
        id: send_confirmation
        condition: ''
  send_confirmation:
    label: 'Send confirmation via Digital Post'
    plugin: aabenforms_digital_post_send
    configuration:
      recipient_token: '[webform_submission:values:cvr:raw]'
      recipient_type: cvr
      sender_cvr_token: ''
      subject_template: Verifikationsresultat
      body_template: '<p>Resultatet af jeres CVR-verifikation er klar. Se vedlagte bilag.</p>'
      type: 'Digital Post'
      result_token: digital_post_result
    successors: {  }
  deny_company:
    label: 'Deny: MitID Erhverv not verified'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: company_verification_denied
      step_label: 'Identitet ikke bekraeftet'
      message: 'Anmodningen blev ikke behandlet, fordi virksomhedens MitID Erhverv-identitet ikke kunne bekraeftes. Log ind og proev igen.'
    successors: {  }
