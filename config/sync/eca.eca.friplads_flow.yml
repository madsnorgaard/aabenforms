uuid: 6b5d4c3e-2a1f-4e8d-9c7b-3f2e1d0c9b8a
langcode: da
status: true
dependencies:
  module:
    - aabenforms_case
    - aabenforms_digital_post_eca
    - aabenforms_kombit
    - aabenforms_workflows
    - eca_content
    - modeler_api
third_party_settings:
  modeler_api:
    modeler_id: workflow_modeler
    label: friplads_flow
id: friplads_flow
weight: null
template: null
events:
  on_submission:
    plugin: 'content_entity:insert'
    configuration:
      type: 'webform_submission friplads'
    successors:
      -
        id: mitid_validate
        condition: ''
conditions:
  gate_mitid_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[friplads_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_mitid_deny:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[friplads_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_eligible:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[friplads_income]'
      right: '200000'
      operator: atmost
      type: numeric
      case: false
  gate_manual:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[friplads_income]'
      right: '200000'
      operator: atmost
      type: numeric
      case: false
  gate_letter_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[digital_post_result_status]'
      right: success
      operator: equal
      type: value
      case: false
  gate_letter_fail:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[digital_post_result_status]'
      right: success
      operator: equal
      type: value
      case: false
gateways: {  }
actions:
  mitid_validate:
    label: 'Validér MitID-session'
    plugin: aabenforms_mitid_validate
    configuration:
      workflow_id_token: workflow_id_friplads
      result_token: friplads_mitid_valid
      session_data_token: friplads_session
    successors:
      -
        id: open_case
        condition: gate_mitid_ok
      -
        id: deny_identity
        condition: gate_mitid_deny
  deny_identity:
    label: 'Afvis: identitet ikke bekræftet'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: friplads_denied
      step_label: 'Identitet ikke bekræftet'
      message: 'Ansøgningen blev ikke behandlet, fordi din identitet ikke kunne bekræftes med MitID. Log ind med MitID og prøv igen.'
    successors: {  }
  open_case:
    label: 'Åbn sag (fripladstilskud)'
    plugin: aabenforms_case_open
    configuration:
      case_type: friplads
      case_id_token: case_id
    successors:
      -
        id: journal_case
        condition: ''
  journal_case:
    label: 'Journalisér sag (SF1470)'
    plugin: aabenforms_case_journal
    configuration:
      case_id_token: '[case_id]'
    successors:
      -
        id: income_lookup
        condition: ''
  income_lookup:
    label: 'Hent husstandsindkomst (eIndkomst)'
    plugin: aabenforms_case_income_lookup
    configuration:
      cpr_token: '[webform_submission:values:applicant_cpr:raw]'
      result_token: friplads_income
    successors:
      -
        id: t_oplyst_auto
        condition: gate_eligible
      -
        id: t_oplyst_manual
        condition: gate_manual
  t_oplyst_auto:
    label: 'Oplys sag (straksbehandling)'
    plugin: aabenforms_case_transition
    configuration:
      case_id_token: '[case_id]'
      target_status: oplyst
      log_message: 'Indkomst ≤ fripladsgrænse - straksbehandling.'
    successors:
      -
        id: t_afgoerelse
        condition: ''
  t_afgoerelse:
    label: 'Automatisk afgørelse (medhold)'
    plugin: aabenforms_case_decide
    configuration:
      case_id_token: '[case_id]'
      afgoerelse_type: medhold
      klagevejledning: ''
      klagefrist_uger: 4
    successors:
      -
        id: send_decision_letter
        condition: ''
  send_decision_letter:
    label: 'Send afgørelsesbrev (Digital Post)'
    plugin: aabenforms_digital_post_send
    configuration:
      recipient_token: '[webform_submission:values:applicant_cpr:raw]'
      recipient_type: cpr
      sender_cvr_token: ''
      subject_template: 'Afgørelse: økonomisk fripladstilskud'
      body_template: '<p>Din ansøgning om økonomisk fripladstilskud er imødekommet (medhold).</p>'
      type: 'Digital Post'
      result_token: digital_post_result
    successors:
      -
        id: sf2900_distribute
        condition: gate_letter_ok
      -
        id: letter_failed
        condition: gate_letter_fail
  letter_failed:
    label: 'Brev ikke afsendt - sag afventer'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: friplads_letter_failed
      step_label: 'Afgørelsesbrev ikke afsendt'
      message: 'Afgørelsen er truffet, men afgørelsesbrevet kunne ikke afsendes. Sagen forbliver åben og afventer fornyet afsendelse - den er ikke lukket.'
    successors: {  }
  sf2900_distribute:
    label: 'Distribuér til fagsystem (SF2900)'
    plugin: aabenforms_case_sf2900_distribute
    configuration:
      case_id_token: '[case_id]'
    successors: {  }
  t_oplyst_manual:
    label: 'Oplys sag (manuel vurdering)'
    plugin: aabenforms_case_transition
    configuration:
      case_id_token: '[case_id]'
      target_status: oplyst
      log_message: 'Indkomst > grænse - sendt til manuel vurdering.'
    successors: {  }
