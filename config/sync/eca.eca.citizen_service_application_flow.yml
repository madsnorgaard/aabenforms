uuid: e5f6a7b8-c9d0-1234-ef01-456789012344
langcode: en
status: true
dependencies:
  module:
    - aabenforms_workflows
    - eca_content
    - modeler_api
third_party_settings:
  modeler_api:
    modeler_id: workflow_modeler
    label: citizen_service_application_flow
id: citizen_service_application_flow
weight: null
template: null
events:
  on_submission:
    plugin: 'content_entity:insert'
    configuration:
      type: 'webform_submission citizen_service_application'
    successors:
      -
        id: mitid_validate
        condition: ''
conditions:
  gate_citizen_mitid_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[citizen_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_citizen_mitid_deny:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[citizen_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
gateways: {  }
actions:
  mitid_validate:
    label: 'Validate MitID session'
    plugin: aabenforms_mitid_validate
    configuration:
      workflow_id_token: workflow_id_citizen_service
      result_token: citizen_mitid_valid
      session_data_token: citizen_session
    successors:
      -
        id: cpr_lookup
        condition: gate_citizen_mitid_ok
      -
        id: deny_citizen
        condition: gate_citizen_mitid_deny
  cpr_lookup:
    label: 'CPR registry lookup'
    plugin: aabenforms_cpr_lookup
    configuration:
      cpr_token: '[citizen_session:cpr]'
      result_token: citizen_data
      use_cache: true
    successors:
      -
        id: log_received
        condition: ''
  log_received:
    label: 'Log: application received'
    plugin: aabenforms_audit_log
    configuration:
      event_type: citizen_service_submitted
      additional_data_token: '[citizen_data:name]'
      message_template: 'Citizen service application received and CPR resolved'
      status_token: citizen_data_status
    successors:
      -
        id: log_caseworker_assigned
        condition: ''
  log_caseworker_assigned:
    label: 'Log: case worker assigned (stub for email)'
    plugin: aabenforms_audit_log
    configuration:
      event_type: citizen_service_caseworker_assigned
      additional_data_token: '[webform_submission:values:caseworker_email:raw]'
      message_template: 'Stub. Production would email the assigned case worker.'
    successors:
      -
        id: send_decision
        condition: ''
  send_decision:
    label: 'Send decision via Digital Post'
    plugin: aabenforms_digital_post_send
    configuration:
      recipient_token: '[webform_submission:values:applicant_cpr:raw]'
      recipient_type: cpr
      sender_cvr_token: ''
      subject_template: 'Afgørelse på din ansøgning'
      body_template: '<p>Der er truffet afgørelse på din ansøgning. Se bilag i Digital Post.</p>'
      type: 'Digital Post'
      result_token: digital_post_result
    successors: {  }
  deny_citizen:
    label: 'Deny: identity not verified'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: citizen_service_denied
      step_label: 'Identitet ikke bekraeftet'
      message: 'Ansoegningen blev ikke behandlet, fordi din identitet ikke kunne bekraeftes med MitID. Log ind med MitID og proev igen.'
    successors: {  }
