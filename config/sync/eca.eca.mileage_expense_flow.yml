uuid: c3d4e5f6-a7b8-9012-cdef-234567890122
langcode: en
status: true
dependencies:
  module:
    - aabenforms_workflows
    - eca_content
    - modeler_api
third_party_settings:
  modeler_api:
    modeler_id: workflow_modeler
    label: mileage_expense_flow
id: mileage_expense_flow
weight: null
template: null
events:
  on_submission:
    plugin: 'content_entity:insert'
    configuration:
      type: 'webform_submission mileage_expense'
    successors:
      -
        id: resolve_employee
        condition: ''
conditions:
  gate_mileage_employee_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[mileage_employee_id_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_mileage_employee_deny:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[mileage_employee_id_status]'
      right: verified
      operator: equal
      type: value
      case: false
gateways: {  }
actions:
  resolve_employee:
    label: 'Bind employee identity from login'
    plugin: aabenforms_resolve_employee
    configuration:
      submitted_employee_id_token: '[webform_submission:values:employee_id:raw]'
      result_token: mileage_employee_id
    successors:
      -
        id: log_received
        condition: gate_mileage_employee_ok
      -
        id: deny_internal
        condition: gate_mileage_employee_deny
  log_received:
    label: 'Log: expense claim received'
    plugin: aabenforms_audit_log
    configuration:
      event_type: mileage_expense_submitted
      additional_data_token: '[webform_submission:values:employee_name:raw]'
      message_template: 'Expense claim submitted'
      status_token: mileage_employee_id_status
    successors:
      -
        id: lookup_manager
        condition: ''
  lookup_manager:
    label: 'Resolve manager email from org-chart'
    plugin: aabenforms_manager_lookup
    configuration:
      employee_id_token: '[mileage_employee_id]'
      fallback_email_token: ''
      result_token: mileage_expense_manager_email
    successors:
      -
        id: log_manager_notified
        condition: ''
  log_manager_notified:
    label: 'Log: manager notified for approval (stub)'
    plugin: aabenforms_audit_log
    configuration:
      event_type: mileage_expense_manager_notified
      additional_data_token: '[mileage_expense_manager_email]'
      message_template: 'Stub. Production would send approval email.'
      status_token: mileage_expense_manager_email_status
    successors:
      -
        id: forward_to_payroll
        condition: ''
  forward_to_payroll:
    label: 'Forward expense claim to payroll'
    plugin: aabenforms_payroll_post
    configuration:
      employee_id_token: '[mileage_employee_id]'
      amount_token: '[webform_submission:values:amount:raw]'
      claim_type: mileage_expense
      result_token: mileage_expense_payroll_result
    successors: {  }
  deny_internal:
    label: 'Deny: employee identity not verified'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: mileage_expense_denied
      step_label: 'Adgang afvist'
      message: 'Udlaegget blev ikke behandlet, fordi det ikke kunne bekraeftes, at du er logget ind som medarbejder.'
    successors: {  }
