id: citizen_service_application
title: 'Citizen Service Application'
description: 'Citizen applies for a municipal service. CPR lookup via Serviceplatformen, case worker review, decision via Digital Post (stub).'
categories: {  }
elements: |
  applicant_name:
    '#type': textfield
    '#title': 'Applicant name'
    '#required': true
    '#description': 'Auto-filled from CPR lookup in production'
  applicant_cpr:
    '#type': cpr_field
    '#title': 'CPR number'
    '#required': true
    '#description': 'Danish CPR (DDMMYY-XXXX). Auto-filled from MitID session in production.'
  applicant_email:
    '#type': email
    '#title': 'Email address'
    '#required': true
    '#description': 'Used for Digital Post fallback and correspondence'
  service_type:
    '#type': select
    '#title': 'Service being applied for'
    '#required': true
    '#options':
      housing_benefit: 'Housing benefit'
      childcare_support: 'Childcare support'
      heating_subsidy: 'Heating subsidy'
      transport_subsidy: 'Transport subsidy'
      other: 'Other (describe below)'
  application_details:
    '#type': textarea
    '#title': 'Application details'
    '#required': true
    '#rows': 5
  supporting_info:
    '#type': textarea
    '#title': 'Supporting information'
    '#description': 'Context that may help the case worker assess eligibility'
    '#rows': 3
  caseworker_email:
    '#type': email
    '#title': 'Assigned case worker'
    '#required': true
    '#description': 'In production, assigned automatically from the municipality case-worker roster'
  caseworker_status:
    '#type': hidden
    '#default_value': pending
  decision_status:
    '#type': hidden
    '#default_value': pending
