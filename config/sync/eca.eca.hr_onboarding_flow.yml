uuid: b2c3d4e5-f6a7-8901-bcde-f12345678911
langcode: en
status: true
dependencies:
  module:
    - aabenforms_workflows
    - eca_content
    - modeler_api
third_party_settings:
  modeler_api:
    modeler_id: workflow_modeler
    label: hr_onboarding_flow
id: hr_onboarding_flow
weight: null
template: null
events:
  on_submission:
    plugin: 'content_entity:insert'
    configuration:
      type: 'webform_submission hr_onboarding'
    successors:
      -
        id: resolve_employee
        condition: ''
conditions:
  gate_hr_employee_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[hr_employee_id_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_hr_employee_deny:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[hr_employee_id_status]'
      right: verified
      operator: equal
      type: value
      case: false
gateways: {  }
actions:
  resolve_employee:
    label: 'Bind HR submitter identity from login'
    plugin: aabenforms_resolve_employee
    configuration:
      submitted_employee_id_token: '[webform_submission:values:hr_submitter_email:raw]'
      result_token: hr_employee_id
    successors:
      -
        id: log_received
        condition: gate_hr_employee_ok
      -
        id: deny_internal
        condition: gate_hr_employee_deny
  log_received:
    label: 'Log: HR onboarding request received'
    plugin: aabenforms_audit_log
    configuration:
      event_type: hr_onboarding_submitted
      additional_data_token: '[webform_submission:values:new_hire_name:raw]'
      message_template: 'New hire request submitted by HR'
    successors:
      -
        id: lookup_manager
        condition: ''
  lookup_manager:
    label: 'Resolve manager email from org-chart'
    plugin: aabenforms_manager_lookup
    configuration:
      employee_id_token: '[hr_employee_id]'
      fallback_email_token: ''
      result_token: hr_onboarding_manager_email
    successors:
      -
        id: log_manager_notified
        condition: ''
  log_manager_notified:
    label: 'Log: manager notified (stub for approval email)'
    plugin: aabenforms_audit_log
    configuration:
      event_type: hr_onboarding_manager_notified
      additional_data_token: '[hr_onboarding_manager_email]'
      message_template: 'Stub. Production would send approval email to manager via a generalized SendApprovalEmailAction.'
    successors:
      -
        id: log_it_notified
        condition: ''
  log_it_notified:
    label: 'Log: IT notified to provision accounts'
    plugin: aabenforms_audit_log
    configuration:
      event_type: hr_onboarding_it_notified
      additional_data_token: '[webform_submission:values:it_distribution_email:raw]'
      message_template: 'Stub. Production would email IT distribution on manager approval.'
    successors: {  }
  deny_internal:
    label: 'Deny: HR submitter identity not verified'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: hr_onboarding_denied
      step_label: 'Adgang afvist'
      message: 'Anmodningen blev ikke behandlet, fordi det ikke kunne bekraeftes, at du er logget ind som medarbejder.'
    successors: {  }
