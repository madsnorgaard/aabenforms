uuid: e5f6a7b8-c9d0-4567-89ab-parking0000001
langcode: en
status: true
dependencies:
  config:
    - webform.webform.parking_permit
  module:
    - aabenforms_digital_post_eca
    - aabenforms_workflows
    - eca_content
    - modeler_api
third_party_settings:
  modeler_api:
    modeler_id: workflow_modeler
    label: parking_permit_flow
id: parking_permit_flow
weight: 0
template: null
events:
  on_submission:
    plugin: 'content_entity:insert'
    configuration:
      type: 'webform_submission parking_permit'
    successors:
      -
        id: mitid_validate
        condition: ''
conditions:
  gate_parking_mitid_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[parking_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_parking_mitid_deny:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[parking_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
gateways: {  }
actions:
  mitid_validate:
    label: 'Validate MitID session'
    plugin: aabenforms_mitid_validate
    configuration:
      workflow_id_token: workflow_id_parking
      result_token: parking_mitid_valid
      session_data_token: parking_session
    successors:
      -
        id: cpr_lookup
        condition: gate_parking_mitid_ok
      -
        id: deny_parking
        condition: gate_parking_mitid_deny
  cpr_lookup:
    label: 'CPR registry lookup'
    plugin: aabenforms_cpr_lookup
    configuration:
      cpr_token: '[webform_submission:values:cpr:raw]'
      result_token: citizen_data
      use_cache: true
    successors:
      -
        id: log_received
        condition: ''
  log_received:
    label: 'Log: parking_permit_submitted'
    plugin: aabenforms_audit_log
    configuration:
      event_type: parking_permit_submitted
      additional_data_token: ''
      message_template: 'Parking permit application received; CPR resolved.'
      status_token: citizen_data_status
    successors:
      -
        id: send_confirmation
        condition: ''
  send_confirmation:
    label: 'Send confirmation via Digital Post'
    plugin: aabenforms_digital_post_send
    configuration:
      recipient_token: '[webform_submission:values:cpr:raw]'
      recipient_type: cpr
      sender_cvr_token: ''
      subject_template: 'Behandling af parkeringstilladelse'
      body_template: '<p>Vi har modtaget din ansøgning om parkeringstilladelse. Afgørelse leveres i Digital Post.</p>'
      type: 'Digital Post'
      result_token: digital_post_result
    successors: {  }
  deny_parking:
    label: 'Deny: identity not verified'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: parking_permit_denied
      step_label: 'Identitet ikke bekraeftet'
      message: 'Ansoegningen blev ikke behandlet, fordi din identitet ikke kunne bekraeftes med MitID. Log ind med MitID og proev igen.'
    successors: {  }
