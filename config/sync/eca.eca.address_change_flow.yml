uuid: e5f6a7b8-c9d0-4567-89ab-addresschange1
langcode: en
status: true
dependencies:
  module:
    - aabenforms_workflows
    - eca_content
    - modeler_api
third_party_settings:
  modeler_api:
    modeler_id: workflow_modeler
    label: address_change_flow
id: address_change_flow
weight: null
template: null
events:
  on_submission:
    plugin: 'content_entity:insert'
    configuration:
      type: 'webform_submission address_change'
    successors:
      -
        id: mitid_validate
        condition: ''
conditions:
  gate_address_mitid_ok:
    plugin: eca_scalar
    configuration:
      negate: false
      left: '[address_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
  gate_address_mitid_deny:
    plugin: eca_scalar
    configuration:
      negate: true
      left: '[address_mitid_valid_status]'
      right: verified
      operator: equal
      type: value
      case: false
gateways: {  }
actions:
  mitid_validate:
    label: 'Validate MitID session'
    plugin: aabenforms_mitid_validate
    configuration:
      workflow_id_token: workflow_id_address_change
      result_token: address_mitid_valid
      session_data_token: address_session
    successors:
      -
        id: cpr_lookup
        condition: gate_address_mitid_ok
      -
        id: deny_address
        condition: gate_address_mitid_deny
  cpr_lookup:
    label: 'CPR registry lookup'
    plugin: aabenforms_cpr_lookup
    configuration:
      cpr_token: '[webform_submission:values:cpr:raw]'
      result_token: citizen_data
      use_cache: true
    successors:
      -
        id: log_received
        condition: ''
  log_received:
    label: 'Log: address change received'
    plugin: aabenforms_audit_log
    configuration:
      event_type: address_change_submitted
      additional_data_token: '[citizen_data:name]'
      message_template: 'Address change submitted; CPR resolved against registry.'
      status_token: citizen_data_status
    successors:
      -
        id: send_confirmation
        condition: ''
  send_confirmation:
    label: 'Send confirmation via Digital Post'
    plugin: aabenforms_digital_post_send
    configuration:
      recipient_token: '[webform_submission:values:cpr:raw]'
      recipient_type: cpr
      sender_cvr_token: ''
      subject_template: 'Bekræftelse på adresseændring'
      body_template: '<p>Vi har registreret din adresseændring. Den nye adresse er gældende fra den angivne dato.</p>'
      type: 'Digital Post'
      result_token: digital_post_result
    successors: {  }
  deny_address:
    label: 'Deny: identity not verified'
    plugin: aabenforms_workflow_deny
    configuration:
      event_type: address_change_denied
      step_label: 'Identitet ikke bekraeftet'
      message: 'Adresseaendringen blev ikke behandlet, fordi din identitet ikke kunne bekraeftes med MitID. Log ind med MitID og proev igen.'
    successors: {  }
