name: CI

on:
  pull_request:
    paths:
      - 'web/modules/custom/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'web/modules/custom/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - '.github/workflows/ci.yml'

permissions:
  contents: write

jobs:
  validate-composer:
    name: Validate Composer
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['8.4']
        dependency-version: [prefer-lowest, prefer-stable]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate Composer files
        run: |
          composer validate --strict composer.json
          composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-progress

  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: drupal_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, pdo, mysql
          tools: composer:v2
          coverage: xdebug

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --no-interaction --no-progress

      - name: Create browser output directory
        run: mkdir -p /tmp/browser_output && chmod 777 /tmp/browser_output

      - name: Run PHPUnit with Coverage
        run: |
          # Tee the output so the test/assertion summary line is parseable
          # later. --log-junit gives us a machine-readable count too.
          # Exit code policy: PHPUnit 11 returns 0 on success, 1 on
          # warnings/deprecations only, 2+ on real failures/errors. Capture
          # via PIPESTATUS so the tee pipe doesn't swallow it, then fail
          # only on >= 2 - warnings are logged but don't block the badge.
          # Suite scope: unit,kernel only. The functional + functional-
          # javascript suites need a real browser (ChromeDriver/Selenium)
          # which this runner doesn't provide; they would 100% fail here.
          XDEBUG_MODE=coverage vendor/bin/phpunit \
            --testsuite=unit,kernel \
            --coverage-text \
            --coverage-cobertura=coverage/cobertura.xml \
            --coverage-html=coverage/html \
            --log-junit=phpunit-junit.xml \
            --testdox 2>&1 | tee phpunit-output.log
          phpunit_exit=${PIPESTATUS[0]}
          if [ "$phpunit_exit" -ge 2 ]; then
            echo "PHPUnit reported test failures (exit $phpunit_exit)"
            exit "$phpunit_exit"
          fi
        env:
          SIMPLETEST_DB: mysql://root:root@127.0.0.1/drupal_test
          SIMPLETEST_BASE_URL: http://localhost

      - name: Generate Coverage Summary
        id: coverage
        run: |
          # Create PHP script to parse overall coverage
          cat > parse_coverage.php << 'PHPEOF'
          <?php
          $xml = simplexml_load_file('coverage/cobertura.xml');
          $metrics = $xml->xpath('//coverage');
          $lines = (float)$metrics[0]['lines-covered'];
          $total = (float)$metrics[0]['lines-valid'];
          $percent = ($total > 0) ? round(($lines / $total) * 100, 2) : 0;
          echo $percent;
          PHPEOF

          COVERAGE=$(php parse_coverage.php)
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "### 📊 Code Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY

          # Create PHP script to parse module coverage
          cat > parse_module.php << 'PHPEOF'
          <?php
          $module = $argv[1];
          $xml = simplexml_load_file('coverage/cobertura.xml');

          // Find the package for this module - package names start with module name
          $packages = $xml->xpath("//package[starts-with(@name, '$module/')]");

          if (!empty($packages)) {
            $lineRate = (float)$packages[0]['line-rate'];
            echo round($lineRate * 100, 2);
          } else {
            echo "0.00";
          }
          PHPEOF

          # Add detailed module breakdown
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Module Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY

          for module in aabenforms_core aabenforms_tenant aabenforms_workflows; do
            PERCENT=$(php parse_module.php "$module")
            echo "| $module | ${PERCENT}% |" >> $GITHUB_STEP_SUMMARY
          done

          rm parse_coverage.php parse_module.php

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html
          retention-days: 30

      - name: Coverage + Tests badges
        run: |
          mkdir -p .github/badges

          # Coverage badge.
          COVERAGE=${{ steps.coverage.outputs.percentage }}
          COVERAGE_COLOR="red"
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COVERAGE_COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COVERAGE_COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COVERAGE_COLOR="orange"
          fi
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"${COVERAGE}%\", \"color\": \"${COVERAGE_COLOR}\"}" > .github/badges/coverage.json

          # Tests badge - parse the test count + failure count from the
          # JUnit log written by phpunit. Source of truth, not the human-
          # readable "Tests: N" line which can be missing on early exit.
          cat > parse_tests.php << 'PHPEOF'
          <?php
          $xml = simplexml_load_file('phpunit-junit.xml');
          $attrs = $xml->testsuite[0]->attributes();
          $total = (int) $attrs['tests'];
          $failures = (int) $attrs['failures'] + (int) $attrs['errors'];
          $passing = $total - $failures;
          echo $passing . ',' . $total . ',' . $failures;
          PHPEOF

          IFS=',' read -r PASSING TOTAL FAILURES <<< "$(php parse_tests.php)"
          rm parse_tests.php
          if [ "$FAILURES" -gt 0 ]; then
            TESTS_MSG="${PASSING}/${TOTAL} passing"
            TESTS_COLOR="red"
          else
            TESTS_MSG="${TOTAL} passing"
            TESTS_COLOR="brightgreen"
          fi
          echo "{\"schemaVersion\": 1, \"label\": \"tests\", \"message\": \"${TESTS_MSG}\", \"color\": \"${TESTS_COLOR}\"}" > .github/badges/tests.json

          # Surface in the run summary too.
          echo "🧪 **Tests:** ${TESTS_MSG}" >> $GITHUB_STEP_SUMMARY

      - name: Commit badges
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/badges/coverage.json .github/badges/tests.json || true
          git diff --staged --quiet || git commit -m "Update coverage + tests badges [skip ci]"
          git push

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate-composer, phpunit]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.validate-composer.result }}" == "success" ]; then
            echo "✅ Composer validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Composer validation failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.phpunit.result }}" == "success" ]; then
            echo "✅ PHPUnit tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ PHPUnit tests failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **View detailed coverage report in artifacts**" >> $GITHUB_STEP_SUMMARY

      - name: Overall result
        if: needs.validate-composer.result == 'failure' || needs.phpunit.result == 'failure'
        run: |
          echo "❌ CI checks failed"
          exit 1
